name: transaction_app
description: Pesa Budget - M-PESA Ledger & Sync Engine for Huawei.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.5

  # --- Data & Cloud ---
  sqflite: ^2.3.0
  path: ^1.8.3
  supabase_flutter: ^2.0.2
  shared_preferences: ^2.2.2
  crypto: ^3.0.3

  # --- Background & SMS (The Stability Fix) ---
  flutter_sms_inbox: ^1.0.4
  telephony: ^0.2.0
  flutter_foreground_task: ^6.1.1
  flutter_overlay_window: ^0.5.0
  permission_handler: ^11.0.1
  connectivity_plus: ^5.0.2

  # --- UI & Style ---
  # Note: We keep google_fonts for helper methods,
  # but we will bundle the actual files locally.
  google_fonts: ^6.1.0
  intl: ^0.18.1
  device_info_plus: ^12.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  # 1. FIXED ASSET PATHS
  assets:
    - assets/icon/
    - assets/images/
    - assets/fonts/

  # 2. ADDED LOCAL FONTS (The Jank-Killer)
  # Download these from fonts.google.com and place in assets/fonts/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600

# --- APP ICON GENERATOR ---
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/mint_logo.png"
  adaptive_icon_background: "#0A0E0C"
  adaptive_icon_foreground: "assets/icon/mint_logo.png"
